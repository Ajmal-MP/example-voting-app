name: RESULT APP CI

on:
  push:
    branches:
      - main
    paths:
      - "result/**"

permissions:
  contents: write

env:
  AWS_REGION: ap-south-1
  ECR_REPOSITORY: result-app
  IMAGE_TAG: ${{ github.run_number }}
  AWS_ACCOUNT_ID: 780797730272

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker image
        run: |
          docker build -f result/Dockerfile -t $ECR_REPOSITORY:${IMAGE_TAG} result

      - name: Tag image
        run: |
          docker tag $ECR_REPOSITORY:${IMAGE_TAG} \
          ${{ steps.login-ecr.outputs.registry }}/$ECR_REPOSITORY:${IMAGE_TAG}

      - name: Push image
        run: |
          docker push \
          ${{ steps.login-ecr.outputs.registry }}/$ECR_REPOSITORY:${IMAGE_TAG}

      - name: Checkout infra repo
        uses: actions/checkout@v4
        with:
          repository: Ajmal-MP/example-vote-app-infra
          token: ${{ secrets.INFRA_REPO_TOKEN }}
          path: infra

      - name: Update Kustomize image tag
        run: |
          cd infra/k8s/overlays/prod
          kustomize edit set image result-app=780797730272.dkr.ecr.${AWS_REGION}.amazonaws.com/result-app:${{ github.run_number }}

      - name: Commit and push infra changes
        run: |
          cd infra

          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add k8s/overlays/prod/kustomization.yaml
          git commit -m "update result-app image tag to ${{ github.run_number }}" || echo "No changes to commit"
          git push
