name: VOTE APP CI

on:
  push:
    branches:
      - main
    paths:
      - "vote/**"


permissions:
  contents: write

env:
  AWS_REGION: ap-south-1
  ECR_REPOSITORY: voting-app
  IMAGE_TAG: ${{ github.run_number }}

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker image
        run: |
          docker build -f vote/Dockerfile -t $ECR_REPOSITORY:${IMAGE_TAG} vote

      - name: Tag image
        run: |
          docker tag $ECR_REPOSITORY:${IMAGE_TAG} \
          ${{ steps.login-ecr.outputs.registry }}/$ECR_REPOSITORY:${IMAGE_TAG}

      - name: Push image
        run: |
          docker push \
          ${{ steps.login-ecr.outputs.registry }}/$ECR_REPOSITORY:${IMAGE_TAG}

      - name: Update Kustomize image tag
        run: |
          cd k8s/overlays/prod
          kustomize edit set image voting-app=$AWS_ACCOUNT_ID.dkr.ecr.${AWS_REGION}.amazonaws.com/voting-app:${{ github.run_number }}
      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
      
          git add k8s/overlays/prod/kustomization.yaml
          git commit -m "update image tag to ${{ github.run_number }}"
          git push
