name: VOTE APP CI

on:
  push:
    branches:
      - main
    paths:
      - "vote/**"

permissions:
  contents: write
  security-events: write

env:
  AWS_REGION: ap-south-1
  ECR_REPOSITORY: voting-app
  IMAGE_TAG: ${{ github.run_number }}
  TRIVY_VERSION: 0.55.0

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker image
        run: |
          docker build -f vote/Dockerfile -t $ECR_REPOSITORY:${IMAGE_TAG} vote

      - name: Install Trivy
        run: |
          sudo apt-get update
          sudo apt-get install -y wget
          wget https://github.com/aquasecurity/trivy/releases/download/v${TRIVY_VERSION}/trivy_${TRIVY_VERSION}_Linux-64bit.deb
          sudo dpkg -i trivy_${TRIVY_VERSION}_Linux-64bit.deb

      - name: Scan Docker image with Trivy
        run: |
          trivy image \
            --severity HIGH,CRITICAL \
            --exit-code 1 \
            --no-progress \
            $ECR_REPOSITORY:${IMAGE_TAG}

      - name: Tag image
        run: |
          docker tag $ECR_REPOSITORY:${IMAGE_TAG} \
          ${{ steps.login-ecr.outputs.registry }}/$ECR_REPOSITORY:${IMAGE_TAG}

      - name: Push image
        run: |
          docker push \
          ${{ steps.login-ecr.outputs.registry }}/$ECR_REPOSITORY:${IMAGE_TAG}

      - name: Checkout infra repo
        uses: actions/checkout@v4
        with:
          repository: Ajmal-MP/example-vote-app-infra
          token: ${{ secrets.INFRA_REPO_TOKEN }}
          path: infra

      - name: Update Kustomize image tag
        run: |
          cd infra/k8s/overlays/prod
          kustomize edit set image voting-app=780797730272.dkr.ecr.${AWS_REGION}.amazonaws.com/voting-app:${{ github.run_number }}

      - name: Commit and push infra changes
        run: |
          cd infra

          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add k8s/overlays/prod/kustomization.yaml
          git commit -m "update vote-app image tag to ${{ github.run_number }}" || echo "No changes to commit"
          git push
